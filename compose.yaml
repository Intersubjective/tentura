name: tentura

services:
  common:
    init: true
    cpu_count: 1
    image: scratch
    network_mode: host
    environment:
      - POSTGRES_PASSWORD
      - JWT_PRIVATE_PEM
      - JWT_PUBLIC_PEM

  proxy:
    extends:
      service: common
    hostname: proxy
    container_name: proxy
    image: alexandrim0/tentura-proxy
    depends_on:
      - hasura
      - tentura
    volumes:
      - ./openresty/conf:/etc/nginx:ro
      - ../tentura/build/web:/usr/local/openresty/nginx/html:ro
    tmpfs:
      - /tmp
      - /var/run/openresty
    environment:
      - "ERROR_LOG_LEVEL=debug"
      - "PGADMIN_ENABLED=true"
      - "LUA_CODE_CACHE=off"
      - "WORKERS=2"

  hasura:
    extends:
      service: common
    hostname: hasura
    container_name: hasura
    image: hasura/graphql-engine
    depends_on:
      - postgres
      - tentura
    environment:
      - 'HASURA_GRAPHQL_DEV_MODE=true'
      - 'HASURA_GRAPHQL_LOG_LEVEL=debug'
      - 'HASURA_GRAPHQL_ENABLE_CONSOLE=true'
      - 'HASURA_GRAPHQL_ADMIN_SECRET=password'
      - 'HASURA_GRAPHQL_ENABLE_TELEMETRY=false'
      - 'HASURA_GRAPHQL_UNAUTHORIZED_ROLE=anon'
      - 'HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES=true'
      - 'HASURA_GRAPHQL_INFER_FUNCTION_PERMISSIONS=false'
      - 'HASURA_GRAPHQL_ENABLE_METADATA_QUERY_LOGGING=true'
      - 'HASURA_GRAPHQL_DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres'
      - 'HASURA_GRAPHQL_JWT_SECRET={"type":"Ed25519", "key":"${JWT_PUBLIC_PEM}", "claims_map": {"x-hasura-allowed-roles": ["user", "admin"], "x-hasura-default-role": "user", "x-hasura-user-id": {"path": "$$.sub"}}}'
      - 'HASURA_GRAPHQL_EXPERIMENTAL_FEATURES=streaming_subscriptions,remove_empty_subscription_responses'
      - 'TENTURA_GRAPHQL_URL=http://localhost:2080/api/v2/graphql'

  postgres:
    extends:
      service: common
    hostname: postgres
    container_name: postgres
    image: alexandrim0/postgres-tentura
    depends_on:
      - meritrank
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - 'MERITRANK_SERVICE_URL=tcp://localhost:8080'

  meritrank:
    extends:
      service: common
    hostname: meritrank
    container_name: meritrank
    image: alexandrim0/meritrank-service
    read_only: true
    environment:
      - 'MERITRANK_SERVER_ADDRESS=0.0.0.0'
      - 'MERITRANK_SERVER_PORT=8080'
      - 'MERITRANK_NUM_WALKS=10000'
      - 'MERITRANK_ZERO_OPINION_FACTOR=0.02'
      - 'MERITRANK_WALKS_CACHE_SIZE=200'

  tentura:
    extends:
      service: common
    hostname: tentura
    container_name: tentura
    image: alexandrim0/tentura-service
    depends_on:
      - postgres
    environment:
      - SERVER_NAME
      - IMAGES_PATH
      - WORKERS_COUNT
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_DBNAME
      - POSTGRES_USERNAME
      - POSTGRES_MAXCONN
      - JWT_PRIVATE_PEM
      - JWT_PUBLIC_PEM
      - JWT_EXPIRES_IN
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - S3_BUCKET
      - S3_ENDPOINT
      - IMAGE_SERVER
      - 'DEBUG_MODE=false'
      - 'NEED_INVITE=false'

  minio:
    extends:
      service: common
    hostname: minio
    container_name: minio
    image: minio/minio:latest
    command: server /data/
    volumes:
      - minio-storage:/data
    environment:
      - MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  schema_fetcher:
    extends:
      service: common
    build:
      dockerfile_inline: |
        FROM node
        RUN npm install -g get-graphql-schema
    image: alexandrim0/schema_fetcher
    container_name: schema_fetcher
    hostname: schema_fetcher
    depends_on:
      - hasura
    volumes:
      - ./packages/client/lib/data/gql:/gql
    user: 1000:1000
    command: sh -c "get-graphql-schema -h 'x-hasura-admin-secret=password' -h 'x-hasura-role=user' http://localhost:8080/v1/graphql > /gql/schema.graphql"

  pgadmin:
    extends:
      service: common
    image: dpage/pgadmin4
    container_name: pgadmin
    hostname: pgadmin
    depends_on:
      - postgres
    environment:
      - 'PGADMIN_DEFAULT_EMAIL=admin@local.host'
      - 'PGADMIN_DEFAULT_PASSWORD=password'
      - 'PGADMIN_DISABLE_POSTFIX=true'
      - 'SERVER_MODE=false'

volumes:
  pg_data:
  minio-storage:
