name: 'Deploy Web Archive to VPS'
description: 'Copy and deploy web archive to VPS server'

inputs:
  archive-pattern:
    description: 'Pattern to match web archive (e.g., web-dev-*.tar.gz)'
    required: true
  archive-name-pattern:
    description: 'Archive name pattern for remote extraction (e.g., web-dev-*.tar.gz)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Copy web archive to VPS
      shell: bash
      env:
        VPS_HOST: ${{ env.VPS_HOST }}
      run: |
        set -euo pipefail
        
        # Validate VPS host
        if [ -z "$VPS_HOST" ]; then
          echo "Error: VPS_HOST environment variable is not set"
          exit 1
        fi
        
        # Mask VPS host to prevent logging
        echo "::add-mask::$VPS_HOST"
        
        # Use -o StrictHostKeyChecking=accept-new to avoid prompts
        # Use -o LogLevel=ERROR to suppress verbose output
        scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o LogLevel=ERROR \
            ${{ inputs.archive-pattern }} \
            deploy@"$VPS_HOST":/tmp/

    - name: Deploy to VPS
      shell: bash
      env:
        VPS_HOST: ${{ env.VPS_HOST }}
      run: |
        set -euo pipefail
        
        # Use -o LogLevel=ERROR to suppress verbose output that might expose sensitive info
        ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o LogLevel=ERROR \
            deploy@"$VPS_HOST" << 'EOF'
          set -euo pipefail
          cd /srv/tentura_server || { echo "Deployment directory /srv/tentura_server not found"; exit 1; }
          
          # Extract web archive to Docker volume
          tar -xzf /tmp/${{ inputs.archive-name-pattern }} -C ./web/
          rm -f /tmp/${{ inputs.archive-name-pattern }}
          
          # Pull latest images
          docker compose -f compose.prod.yaml pull
          
          # Restart services
          docker compose -f compose.prod.yaml down
          docker compose -f compose.prod.yaml up -d
        EOF

