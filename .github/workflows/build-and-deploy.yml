name: Build and Deploy

on:
  push:
    branches:
      - dev
      - main
      - fake_dev

env:
  REGISTRY: ghcr.io

jobs:
  determine-target:
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.set-type.outputs.build_type }}
      server_version: ${{ steps.extract-versions.outputs.server_version }}
      client_version: ${{ steps.extract-versions.outputs.client_version }}
      sha: ${{ steps.sha.outputs.sha }}
      deploy_dev: ${{ steps.set-type.outputs.deploy_dev }}
      deploy_stage: ${{ steps.set-type.outputs.deploy_stage }}
      deploy_prod: ${{ steps.set-type.outputs.deploy_prod }}
      image_name: ${{ steps.set-image-name.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: set-image-name
        run: |
          set -euo pipefail
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${{ env.REGISTRY }}/$REPO_OWNER_LOWER/tentura-server" >> $GITHUB_OUTPUT

      - name: Set build type
        id: set-type
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" == "refs/heads/fake_dev" ]; then
            echo "build_type=fake_dev" >> $GITHUB_OUTPUT
            echo "deploy_dev=true" >> $GITHUB_OUTPUT
            echo "deploy_stage=false" >> $GITHUB_OUTPUT
            echo "deploy_prod=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "deploy_dev=false" >> $GITHUB_OUTPUT
            echo "deploy_stage=true" >> $GITHUB_OUTPUT
            echo "deploy_prod=true" >> $GITHUB_OUTPUT
          else
            echo "build_type=" >> $GITHUB_OUTPUT
            echo "deploy_dev=false" >> $GITHUB_OUTPUT
            echo "deploy_stage=false" >> $GITHUB_OUTPUT
            echo "deploy_prod=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract versions
        id: extract-versions
        run: |
          set -euo pipefail
          SERVER_VERSION=$(grep '^version:' packages/server/pubspec.yaml | sed 's/version: //' | tr -d ' ')
          CLIENT_VERSION=$(grep '^version:' packages/client/pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "server_version=$SERVER_VERSION" >> $GITHUB_OUTPUT
          echo "client_version=$CLIENT_VERSION" >> $GITHUB_OUTPUT

      - name: Set SHA
        id: sha
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: determine-target
    if: needs.determine-target.outputs.build_type != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart and Flutter
        uses: ./.github/actions/setup-dart-flutter
        with:
          cache-key: pub
          include-server-cache: 'true'

      - name: Install dependencies (root)
        run: dart pub get
        working-directory: .

      - name: Install dependencies (server)
        run: dart pub get
        working-directory: packages/server

      - name: Install dependencies (client)
        run: flutter pub get
        working-directory: packages/client

      - name: Run codegen (server)
        run: dart run build_runner build -d
        working-directory: packages/server

      - name: Run server tests
        run: dart test
        working-directory: packages/server

      - name: Generate localizations (client)
        run: flutter gen-l10n
        working-directory: packages/client

      - name: Run codegen (client)
        run: dart run build_runner build -d
        working-directory: packages/client

      - name: Run client tests
        run: flutter test
        working-directory: packages/client

  build-server:
    runs-on: ubuntu-latest
    needs: [determine-target, test]
    if: needs.determine-target.outputs.build_type != ''
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          set -euo pipefail
          if [ "${{ needs.determine-target.outputs.build_type }}" == "fake_dev" ]; then
            echo "tags=${{ needs.determine-target.outputs.image_name }}:fake_dev-${{ needs.determine-target.outputs.sha }},${{ needs.determine-target.outputs.image_name }}:fake_dev-latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ needs.determine-target.outputs.image_name }}:v${{ needs.determine-target.outputs.server_version }},${{ needs.determine-target.outputs.image_name }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile_build
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    runs-on: ubuntu-latest
    needs: [determine-target, test]
    if: needs.determine-target.outputs.build_type != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart and Flutter
        uses: ./.github/actions/setup-dart-flutter
        with:
          cache-key: pub-client
          include-server-cache: 'false'

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/client

      - name: Generate localizations
        run: flutter gen-l10n
        working-directory: packages/client

      - name: Run codegen
        run: dart run build_runner build -d
        working-directory: packages/client

      - name: Validate Flutter setup
        run: |
          set -euo pipefail
          echo "Validating Flutter setup..."
          FLUTTER_VERSION=$(flutter --version | head -1)
          echo "Flutter version: $FLUTTER_VERSION"
          
          echo "Running Flutter doctor..."
          flutter doctor || true
          
          echo "Checking WASM support..."
          if flutter build web --help 2>&1 | grep -q "wasm"; then
            echo "WASM build support confirmed"
          else
            echo "Error: WASM build support not available"
            exit 1
          fi

      - name: Build web (fake_dev)
        if: needs.determine-target.outputs.build_type == 'fake_dev'
        timeout-minutes: 5
        run: |
          set -euo pipefail
          echo "Building web (fake_dev) with WASM..."
          echo "Flutter version: $(flutter --version | head -1)"
          
          if [ -f env/dev-web.env ]; then
            echo "Using env/dev-web.env file"
            flutter build web \
              --wasm \
              --pwa-strategy=none \
              --source-maps \
              --verbose \
              --dart-define-from-file=env/dev-web.env
          else
            echo "env/dev-web.env not found, using default SERVER_NAME"
            flutter build web \
              --wasm \
              --pwa-strategy=none \
              --source-maps \
              --verbose \
              --dart-define=SERVER_NAME=https://dev.tentura.io
          fi
          echo "Build completed successfully"
        working-directory: packages/client

      - name: Build web (stage)
        if: needs.determine-target.outputs.build_type == 'release'
        timeout-minutes: 5
        run: |
          set -euo pipefail
          echo "Building web (stage) with WASM..."
          echo "Flutter version: $(flutter --version | head -1)"
          
          if [ -f .env ]; then
            echo "Using .env file"
            flutter build web \
              --wasm \
              --pwa-strategy=none \
              --source-maps \
              --verbose \
              --dart-define-from-file=.env \
              --dart-define=SERVER_NAME=https://stage.tentura.io
          else
            echo ".env not found, using default SERVER_NAME"
            flutter build web \
              --wasm \
              --pwa-strategy=none \
              --source-maps \
              --verbose \
              --dart-define=SERVER_NAME=https://stage.tentura.io
          fi
          echo "Build completed successfully"
        working-directory: packages/client

      - name: Create web archive (stage)
        if: needs.determine-target.outputs.build_type == 'release'
        run: |
          set -euo pipefail
          cd packages/client/build/web
          tar -czf ../../../../web-stage-${{ needs.determine-target.outputs.client_version }}.tar.gz .
          cd ../../../..
          # Clean build directory for prod build
          flutter clean
          flutter pub get
          flutter gen-l10n
          dart run build_runner build -d
        working-directory: packages/client

      - name: Build web (prod)
        if: needs.determine-target.outputs.build_type == 'release'
        timeout-minutes: 5
        run: |
          set -euo pipefail
          echo "Building web (prod) with WASM..."
          echo "Flutter version: $(flutter --version | head -1)"
          
          if [ -f .env ]; then
            echo "Using .env file"
            flutter build web \
              --wasm \
              --pwa-strategy=none \
              --source-maps \
              --verbose \
              --dart-define-from-file=.env \
              --dart-define=SERVER_NAME=https://app.tentura.io \
              --dart-define=NEED_INVITE_CODE=true
          else
            echo ".env not found, using default SERVER_NAME"
            flutter build web \
              --wasm \
              --pwa-strategy=none \
              --source-maps \
              --verbose \
              --dart-define=SERVER_NAME=https://app.tentura.io \
              --dart-define=NEED_INVITE_CODE=true
          fi
          echo "Build completed successfully"
        working-directory: packages/client

      - name: Create web archive (dev)
        if: needs.determine-target.outputs.build_type == 'fake_dev'
        run: |
          set -euo pipefail
          cd packages/client/build/web
          tar -czf ../../../../web-dev-${{ needs.determine-target.outputs.sha }}.tar.gz .
          cd ../../../..

      - name: Create web archive (prod)
        if: needs.determine-target.outputs.build_type == 'release'
        run: |
          set -euo pipefail
          cd packages/client/build/web
          tar -czf ../../../../web-prod-${{ needs.determine-target.outputs.client_version }}.tar.gz .
          cd ../../../..

      - name: Upload web archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-archives
          path: |
            web-*.tar.gz
          retention-days: 7

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [determine-target, build-server, build-web]
    if: needs.determine-target.outputs.deploy_dev == 'true'
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Download web archive
        uses: actions/download-artifact@v4
        with:
          name: web-archives
          pattern: web-dev-*.tar.gz

      - name: Setup SSH
        id: setup-ssh
        uses: ./.github/actions/setup-ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy web archive
        uses: ./.github/actions/deploy-web-archive
        env:
          VPS_HOST: ${{ steps.setup-ssh.outputs.vps-host }}
        with:
          archive-pattern: web-dev-*.tar.gz
          archive-name-pattern: web-dev-*.tar.gz

  deploy-stage:
    runs-on: ubuntu-latest
    needs: [determine-target, build-server, build-web]
    if: needs.determine-target.outputs.deploy_stage == 'true'
    environment:
      name: stage
    steps:
      - uses: actions/checkout@v4

      - name: Download web archive
        uses: actions/download-artifact@v4
        with:
          name: web-archives
          pattern: web-stage-*.tar.gz

      - name: Setup SSH
        id: setup-ssh
        uses: ./.github/actions/setup-ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy web archive
        uses: ./.github/actions/deploy-web-archive
        env:
          VPS_HOST: ${{ steps.setup-ssh.outputs.vps-host }}
        with:
          archive-pattern: web-stage-*.tar.gz
          archive-name-pattern: web-stage-*.tar.gz

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [determine-target, build-server, build-web, deploy-stage]
    if: needs.determine-target.outputs.deploy_prod == 'true'
    # Production deployment requires manual approval
    # Configure approval requirement in: Settings > Environments > prod > Required reviewers
    environment:
      name: prod
      url: https://app.tentura.io
    steps:
      - uses: actions/checkout@v4

      - name: Download web archive
        uses: actions/download-artifact@v4
        with:
          name: web-archives
          pattern: web-prod-*.tar.gz

      - name: Setup SSH
        id: setup-ssh
        uses: ./.github/actions/setup-ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy web archive
        uses: ./.github/actions/deploy-web-archive
        env:
          VPS_HOST: ${{ steps.setup-ssh.outputs.vps-host }}
        with:
          archive-pattern: web-prod-*.tar.gz
          archive-name-pattern: web-prod-*.tar.gz

