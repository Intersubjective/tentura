name: Postgres integration tests (nightly)

# PR/push CI excludes @Tags(['pg']) tests (see pipeline.yml). This job runs them
# against the same postgres-tentura image used in compose.dev.yaml.
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  POSTGRES_HOST: 127.0.0.1
  POSTGRES_PORT: 5432
  POSTGRES_PASSWORD: password

jobs:
  pg-tests:
    runs-on: ubuntu-latest
    services:
      meritrank:
        image: vbulavintsev/meritrank-service:v0.8.0
        env:
          MERITRANK_SERVER_ADDRESS: 0.0.0.0
          MERITRANK_SERVER_PORT: 8080
          MERITRANK_NUM_WALKS: 1000
          MERITRANK_ZERO_OPINION_FACTOR: 0.02
          MERITRANK_WALKS_CACHE_SIZE: 200

      postgres:
        image: vbulavintsev/postgres-tentura:v0.8.0
        env:
          POSTGRES_PASSWORD: password
          MERITRANK_SERVICE_URL: tcp://meritrank:8080
          MERITRANK_RECV_TIMEOUT_MSEC: 60000
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 24
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            packages/server/.dart_tool
          key: ${{ runner.os }}-pub-pg-${{ hashFiles('pubspec.lock', 'packages/server/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-pg-
            ${{ runner.os }}-pub-

      - name: Run pg-tagged server tests
        run: |
          set -euo pipefail
          dart pub get
          cd packages/server
          dart run build_runner build -d
          dart test --tags pg
