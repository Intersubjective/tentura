name: Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/intersubjective/tentura
  FLUTTER_IMAGE: ghcr.io/cirruslabs/flutter:stable

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine server version
        id: versions
        run: |
          set -euo pipefail
          VERSION_LINE=$(grep '^version:' packages/server/pubspec.yaml | sed 's/version:[[:space:]]*//')
          VERSION_CLEAN=${VERSION_LINE//+/-}
          VERSION_CLEAN=${VERSION_CLEAN//\//-}
          echo "server_version=$VERSION_CLEAN" >> $GITHUB_OUTPUT

      - name: Run tests in Flutter container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}":/app -w /app \
            ${{ env.FLUTTER_IMAGE }} \
            bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq libsqlite3-dev > /dev/null
              dart pub get
              cd packages/server && dart run build_runner build -d && dart test && cd ../..
              flutter pub get
              cd packages/client && flutter gen-l10n && dart run build_runner build -d && flutter test && cd ../..
            '

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile_build
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.server_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web (stage) in Flutter container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}":/app -w /app/packages/client \
            ${{ env.FLUTTER_IMAGE }} \
            bash -c '
              set -euo pipefail
              if [ -f /app/.env ]; then
                flutter build web \
                  --wasm \
                  --pwa-strategy=none \
                  --source-maps \
                  --dart-define-from-file=/app/.env \
                  --dart-define=SERVER_NAME=https://stage.tentura.io
              else
                flutter build web \
                  --wasm \
                  --pwa-strategy=none \
                  --source-maps \
                  --dart-define=SERVER_NAME=https://stage.tentura.io
              fi
            '

      - name: Create web archive (stage)
        run: |
          set -euo pipefail
          cd packages/client/build/web
          tar -czf "${{ github.workspace }}/web-stage-${{ steps.versions.outputs.server_version }}.tar.gz" .
          cd "${{ github.workspace }}"

      - name: Build web (prod) in Flutter container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}":/app -w /app/packages/client \
            ${{ env.FLUTTER_IMAGE }} \
            bash -c '
              set -euo pipefail
              flutter clean && flutter pub get && flutter gen-l10n && dart run build_runner build -d
              if [ -f /app/.env ]; then
                flutter build web \
                  --wasm \
                  --pwa-strategy=none \
                  --source-maps \
                  --dart-define-from-file=/app/.env \
                  --dart-define=SERVER_NAME=https://app.tentura.io \
                  --dart-define=NEED_INVITE_CODE=true
              else
                flutter build web \
                  --wasm \
                  --pwa-strategy=none \
                  --source-maps \
                  --dart-define=SERVER_NAME=https://app.tentura.io \
                  --dart-define=NEED_INVITE_CODE=true
              fi
            '

      - name: Create web archive (prod)
        run: |
          set -euo pipefail
          cd packages/client/build/web
          tar -czf "${{ github.workspace }}/web-prod-${{ steps.versions.outputs.server_version }}.tar.gz" .
          cd "${{ github.workspace }}"

      - name: Upload web archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-archives
          path: |
            web-stage-*.tar.gz
            web-prod-*.tar.gz
          retention-days: 7

  deploy-stage:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: stage
    steps:
      - uses: actions/checkout@v4

      - name: Download web archive
        uses: actions/download-artifact@v4
        with:
          name: web-archives
          pattern: web-stage-*.tar.gz

      - name: Determine archive filename
        id: archive-name
        run: |
          set -euo pipefail
          ARCHIVE_FILE=$(ls -1 web-stage-*.tar.gz 2>/dev/null | head -1)
          if [ -z "$ARCHIVE_FILE" ]; then
            echo "Error: No web-stage archive file found" >&2
            exit 1
          fi
          echo "archive_name=$ARCHIVE_FILE" >> $GITHUB_OUTPUT

      - name: Setup SSH
        id: setup-ssh
        uses: ./.github/actions/setup-ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy web archive
        uses: ./.github/actions/deploy-web-archive
        env:
          VPS_HOST: ${{ steps.setup-ssh.outputs.vps-host }}
        with:
          archive-name: ${{ steps.archive-name.outputs.archive_name }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-stage
    if: github.event_name == 'workflow_dispatch'
    # Production deployment: configure approval in Settings > Environments > prod > Required reviewers
    environment:
      name: prod
      url: https://app.tentura.io
    steps:
      - uses: actions/checkout@v4

      - name: Download web archive
        uses: actions/download-artifact@v4
        with:
          name: web-archives
          pattern: web-prod-*.tar.gz

      - name: Determine archive filename
        id: archive-name
        run: |
          set -euo pipefail
          ARCHIVE_FILE=$(ls -1 web-prod-*.tar.gz 2>/dev/null | head -1)
          if [ -z "$ARCHIVE_FILE" ]; then
            echo "Error: No web-prod archive file found" >&2
            exit 1
          fi
          echo "archive_name=$ARCHIVE_FILE" >> $GITHUB_OUTPUT

      - name: Setup SSH
        id: setup-ssh
        uses: ./.github/actions/setup-ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy web archive
        uses: ./.github/actions/deploy-web-archive
        env:
          VPS_HOST: ${{ steps.setup-ssh.outputs.vps-host }}
        with:
          archive-name: ${{ steps.archive-name.outputs.archive_name }}
