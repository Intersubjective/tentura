name: Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/intersubjective/tentura
  BUILDER_IMAGE: ghcr.io/intersubjective/tentura-builder

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: .pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Run tests in builder container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}":/app -w /app \
            -v "${{ github.workspace }}/.pub-cache":/root/.pub-cache \
            ${{ env.BUILDER_IMAGE }}:latest \
            bash -c '
              set -euo pipefail
              dart pub get
              flutter pub get
              cd packages/server && dart run build_runner build -d && dart test && cd ../..
              cd packages/client && flutter gen-l10n && dart run build_runner build -d && flutter test
            '

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine server version
        id: versions
        run: |
          set -euo pipefail
          VERSION_LINE=$(grep '^version:' packages/server/pubspec.yaml | sed 's/version:[[:space:]]*//')
          VERSION_CLEAN=${VERSION_LINE//+/-}
          VERSION_CLEAN=${VERSION_CLEAN//\//-}
          echo "server_version=$VERSION_CLEAN" >> $GITHUB_OUTPUT

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: .pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Build dev web in builder container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}":/app -w /app \
            -v "${{ github.workspace }}/.pub-cache":/root/.pub-cache \
            --env SERVER_VERSION="${{ steps.versions.outputs.server_version }}" \
            ${{ env.BUILDER_IMAGE }}:latest \
            bash -c '
              set -euo pipefail
              flutter pub get
              cd packages/client && flutter gen-l10n && dart run build_runner build -d
              if [ -f /app/.env ]; then
                flutter build web \
                  --wasm \
                  --pwa-strategy=none \
                  --source-maps \
                  --dart-define-from-file=/app/.env \
                  --dart-define=SERVER_NAME=https://dev.tentura.io \
                  --dart-define=NEED_INVITE_CODE=true
              else
                flutter build web \
                  --wasm \
                  --pwa-strategy=none \
                  --source-maps \
                  --dart-define=SERVER_NAME=https://dev.tentura.io \
                  --dart-define=NEED_INVITE_CODE=true
              fi
              cd build/web && tar -czf /app/web-dev-${SERVER_VERSION}.tar.gz . && cd ../..
            '

      - name: Upload web archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-archives
          path: web-dev-*.tar.gz
          retention-days: 7

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine server version
        id: versions
        run: |
          set -euo pipefail
          VERSION_LINE=$(grep '^version:' packages/server/pubspec.yaml | sed 's/version:[[:space:]]*//')
          VERSION_CLEAN=${VERSION_LINE//+/-}
          VERSION_CLEAN=${VERSION_CLEAN//\//-}
          echo "server_version=$VERSION_CLEAN" >> $GITHUB_OUTPUT

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile_build
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.server_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [test, build-web, build-server]
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: dev
      url: https://dev.tentura.io
    steps:
      - uses: actions/checkout@v4

      - name: Download web archive
        uses: actions/download-artifact@v4
        with:
          name: web-archives
          pattern: web-dev-*.tar.gz

      - name: Determine archive filename
        id: archive-name
        run: |
          set -euo pipefail
          ARCHIVE_FILE=$(ls -1 web-dev-*.tar.gz 2>/dev/null | head -1)
          if [ -z "$ARCHIVE_FILE" ]; then
            echo "Error: No web-dev archive file found" >&2
            exit 1
          fi
          echo "archive_name=$ARCHIVE_FILE" >> $GITHUB_OUTPUT

      - name: Setup SSH
        id: setup-ssh
        uses: ./.github/actions/setup-ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy web archive
        uses: ./.github/actions/deploy-web-archive
        env:
          VPS_HOST: ${{ steps.setup-ssh.outputs.vps-host }}
        with:
          archive-name: ${{ steps.archive-name.outputs.archive_name }}
