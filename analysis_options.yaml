include:
  - package:very_good_analysis/analysis_options.yaml

plugins:
  tentura_lints:
    path: packages/tentura_lints
    diagnostics:
      no_domain_to_data_or_ui_import: true
      no_cubit_to_data_service_import: true
      no_map_dynamic_in_use_case_api: true
      no_raw_graphql_in_dart: true
      no_inline_font_size: true
      cubit_requires_use_case_for_multi_repos: true
      no_operational_raw_color: true
      no_operational_raw_text_style: true
      no_operational_pill_widgets_in_beacon_view: true
      no_raw_edge_insets: true
      no_raw_border_radius: true
      no_request_domain_entity: true
      use_tentura_top_bar: true

analyzer:
  exclude:
    - ".pub-cache/**"
    - "packages/widgetbook/**"
    - "temp/**"

linter:
  rules:
    directives_ordering: false
    sort_pub_dependencies: false
    public_member_api_docs: false
    always_use_package_imports: false
    lines_longer_than_80_chars: false
