name: tentura_lints
description: Project-specific analyzer plugin rules for Tentura.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  analysis_server_plugin: ^0.3.10
  analyzer: ^10.2.0

dev_dependencies:
  analyzer_testing: ^0.2.0
  test: ^1.26.3
  test_reflective_loader: ^0.2.0

plugin:
  platforms:
    dart:
      pluginClass: TenturaLintsPlugin
      fileName: main.dart
