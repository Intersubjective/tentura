name: tentura_lints
description: Project-specific analyzer plugin rules for Tentura.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  analysis_server_plugin: ^0.3.13
  analyzer: ^12.0.0

dev_dependencies:
  analyzer_testing: ^0.2.4
  test: ^1.31.0
  test_reflective_loader: ^0.4.0

plugin:
  platforms:
    dart:
      pluginClass: TenturaLintsPlugin
      fileName: main.dart
