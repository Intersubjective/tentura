include:
  - package:bloc_lint/recommended.yaml
  - package:flutter_lints/flutter.yaml
  - package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    specify_nonobvious_property_types: ignore
  exclude:
    - "../../.pub-cache/**"
    - "**/*.gql.dart"
    - "**/*.gql.g.dart"
    - "**/*.freezed.dart"
    - "test/drift/**.dart"

linter:
  rules:
    avoid_relative_lib_imports: true
    directives_ordering: false
    sort_pub_dependencies: false
    public_member_api_docs: false
    sort_constructors_first: false
    always_use_package_imports: false
    lines_longer_than_80_chars: false
    avoid_catches_without_on_clauses: false
    avoid_positional_boolean_parameters: false

custom_lint:
  rules:
    - no_domain_to_data_or_ui_import
    - no_cubit_to_data_service_import
    - no_map_dynamic_in_use_case_api
    - no_raw_graphql_in_dart
    - cubit_requires_use_case_for_multi_repos
    - no_operational_raw_color
    - no_operational_raw_text_style
    - no_operational_pill_widgets_in_beacon_view

bloc:
  rules:
    - avoid_public_fields
    - avoid_flutter_imports
    - avoid_public_bloc_methods
    - prefer_void_public_cubit_methods
