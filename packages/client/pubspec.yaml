name: tentura
description: 'Social network for communities'
publish_to: 'none'

version: 1.17.0

environment:
  sdk: ^3.11.4
  flutter: ^3.41.6

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # From Workspace
  http:
  meta:
  uuid:
  drift:
  image:
  get_it:
  logging:
  latlong2:
  drift_dev:
  collection:
  injectable:
  tentura_root:
  json_annotation:
  dart_jsonwebtoken:
  freezed_annotation:

  # Common
  rxdart: ^0.28.0
  auto_route: ^11.1.0
  http_parser: ^4.1.2
  built_value: ^8.12.3
  flutter_bloc: ^9.1.1
  synchronized: ^3.4.0
  built_collection: ^5.1.1

  # Platform related
  web: ^1.1.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  share_plus: ^12.0.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  drift_flutter: ^0.2.8
  firebase_core: ^4.4.0
  share_handler: ^0.0.25
  mobile_scanner: ^7.1.4
  package_info_plus: ^9.0.0
  firebase_messaging: ^16.1.1
  flutter_native_splash: ^2.4.7
  flutter_secure_storage: ^10.0.0

  # Logs & Stats
  sentry_drift: ^9.10.0
  sentry_flutter: ^9.10.0

  # Remote API related
  ferry: ^0.16.2-dev.4
  gql_exec: ^1.0.0
  gql_http_link: ^1.2.0
  gql_error_link: ^1.0.1
  gql_dedupe_link: ^4.0.0
  ed25519_edwards: ^0.3.1
  web_socket_client: ^0.2.1

  # UI related
  nil: ^1.1.1
  intl: ^0.20.2
  readmore: ^3.0.0
  qr_flutter: ^4.1.0
  flutter_map: ^8.2.2
  flutter_svg: ^2.2.3
  google_fonts: ^7.0.2
  validatorless: ^1.2.5
  blurhash_shader: ^1.1.2
  vector_graphics: ^1.1.19
  visibility_detector: ^0.4.0
  force_directed_graphview: ^0.6.2
  scrollable_positioned_list: ^0.3.8

  # Build time
  html: ^0.15.6
  hooks: ^1.0.0
  pubspec_parse: ^1.5.0
  pretty_print_json: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # From Workspace
  lints:
  freezed:
  build_runner:
  json_serializable:
  very_good_analysis:
  injectable_generator:

  bloc_lint: ^0.3.5
  flutter_lints: ^6.0.0
  ferry_generator: ^0.14.0-dev.2
  sentry_dart_plugin: ^3.0.0
  auto_route_generator: ^10.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Tentura
      fonts:
        - asset: fonts/tentura-icons.ttf
  assets:
    - images/placeholder/
    - images/intro.svg.vec

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  ignore_missing: true
  project: tentura
