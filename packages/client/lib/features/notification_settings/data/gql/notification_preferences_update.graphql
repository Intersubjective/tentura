mutation NotificationPreferencesUpdate(
  $pushCategories: [String!]
  $emailCategories: [String!]
  $mutedInAppEventClasses: [String!]
  $quietHoursStart: Int
  $quietHoursEnd: Int
  $clearQuietHours: Boolean
  $tzOffsetMinutes: Int
  $emailDigest: String
  $snoozeUntil: String
  $clearSnooze: Boolean
  $lockScreenSafe: Boolean
  $locale: String
) {
  notificationPreferencesUpdate(
    pushCategories: $pushCategories
    emailCategories: $emailCategories
    mutedInAppEventClasses: $mutedInAppEventClasses
    quietHoursStart: $quietHoursStart
    quietHoursEnd: $quietHoursEnd
    clearQuietHours: $clearQuietHours
    tzOffsetMinutes: $tzOffsetMinutes
    emailDigest: $emailDigest
    snoozeUntil: $snoozeUntil
    clearSnooze: $clearSnooze
    lockScreenSafe: $lockScreenSafe
    locale: $locale
  ) {
    accountId
    pushCategories
    emailCategories
    mutedInAppEventClasses
    quietHoursStart
    quietHoursEnd
    tzOffsetMinutes
    emailDigest
    snoozeUntil
    lockScreenSafe
    locale
  }
}
