mutation CoordinationItemPublishPromise(
  $itemId: String!
  $targetPersonId: String!
  $staleAfterDays: Int
) {
  publishPromise(
    itemId: $itemId
    targetPersonId: $targetPersonId
    staleAfterDays: $staleAfterDays
  ) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
    lastRemindedAt
    staleAfterDays
  }
}
