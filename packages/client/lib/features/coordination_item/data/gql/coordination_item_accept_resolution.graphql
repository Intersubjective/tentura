mutation CoordinationItemAcceptResolution($itemId: String!) {
  acceptResolution(itemId: $itemId) {
    id
    beaconId
    kind
    status
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
  }
}
