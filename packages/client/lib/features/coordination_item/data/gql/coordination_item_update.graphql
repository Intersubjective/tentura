mutation CoordinationItemUpdate(
  $itemId: String!
  $title: String!
  $body: String
) {
  updateCoordinationItem(itemId: $itemId, title: $title, body: $body) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
    lastRemindedAt
    staleAfterDays
  }
}
