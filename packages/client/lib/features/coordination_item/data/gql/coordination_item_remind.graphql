mutation CoordinationItemRemind($itemId: String!) {
  remindCoordinationItem(itemId: $itemId) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
    lastRemindedAt
    staleAfterDays
    messageCount
    unreadCount
    lastSeenAt
  }
}
