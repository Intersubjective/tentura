query CoordinationItemList(
  $beaconId: String!
  $status: Int
  $kind: Int
  $acceptedById: String
  $targetPersonId: String
  $linkedParentItemId: String
  $rootOnly: Boolean
) {
  coordinationItemsByBeacon(
    beaconId: $beaconId
    status: $status
    kind: $kind
    acceptedById: $acceptedById
    targetPersonId: $targetPersonId
    linkedParentItemId: $linkedParentItemId
    rootOnly: $rootOnly
  ) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
    lastRemindedAt
    staleAfterDays
    messageCount
    unreadCount
    lastSeenAt
  }
}
