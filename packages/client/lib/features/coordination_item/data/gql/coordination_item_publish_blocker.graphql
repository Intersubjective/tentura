mutation CoordinationItemPublishBlocker(
  $itemId: String!
  $staleAfterDays: Int
) {
  publishBlocker(itemId: $itemId, staleAfterDays: $staleAfterDays) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
    lastRemindedAt
    staleAfterDays
  }
}
