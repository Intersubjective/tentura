mutation CoordinationItemCreateDraftBlocker(
  $beaconId: String!
  $title: String!
  $body: String
) {
  createDraftBlocker(
    beaconId: $beaconId
    title: $title
    body: $body
  ) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
  }
}
