mutation CoordinationItemUpdateDraftAsk(
  $itemId: String!
  $title: String!
  $body: String
  $targetPersonId: String
) {
  updateDraftAsk(itemId: $itemId, title: $title, body: $body, targetPersonId: $targetPersonId) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
  }
}
