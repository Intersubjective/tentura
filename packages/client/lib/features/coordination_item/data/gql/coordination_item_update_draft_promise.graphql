mutation CoordinationItemUpdateDraftPromise(
  $itemId: String!
  $title: String!
  $body: String
  $targetPersonId: String
  $staleAfterDays: Int
) {
  updateDraftPromise(
    itemId: $itemId
    title: $title
    body: $body
    targetPersonId: $targetPersonId
    staleAfterDays: $staleAfterDays
  ) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
    lastRemindedAt
    staleAfterDays
  }
}
