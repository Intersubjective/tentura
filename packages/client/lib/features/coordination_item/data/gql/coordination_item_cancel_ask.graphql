mutation CoordinationItemCancelAsk($itemId: String!, $reason: String) {
  cancelAsk(itemId: $itemId, reason: $reason) {
    id
    beaconId
    kind
    status
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
  }
}
