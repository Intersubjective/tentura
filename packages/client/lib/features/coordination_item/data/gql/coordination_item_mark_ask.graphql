mutation CoordinationItemMarkAsk(
  $beaconId: String!
  $title: String!
  $targetPersonId: String!
  $body: String
  $linkedMessageId: String
  $staleAfterDays: Int
) {
  markAsk(
    beaconId: $beaconId
    title: $title
    targetPersonId: $targetPersonId
    body: $body
    linkedMessageId: $linkedMessageId
    staleAfterDays: $staleAfterDays
  ) {
    id
    beaconId
    kind
    status
    source
    published
    title
    body
    creatorId
    targetPersonId
    acceptedById
    targetItemId
    targetMessageId
    linkedMessageId
    linkedParentItemId
    ordering
    createdAt
    updatedAt
    resolvedAt
    cancelledAt
    staleAt
    lastRemindedAt
    staleAfterDays
  }
}
