# V2: forwards-graph view focused on one active committer of the beacon.
# Returns the union of (a) the committer's ancestor closure (the chain that
# delivered the beacon to them) and (b) the viewer's own forward edges and
# their ancestor closure, so a viewer who is neither author nor committer
# still sees how they fit between the author and the committer. Authorization
# matches `beaconForwardGraph` (author / has-edge / active commitment).

query BeaconCommitterForwardPath($id: String!, $committerId: String!) {
  beaconCommitterForwardPath(id: $id, committerId: $committerId) {
    beaconId
    authorId
    viewerId
    committerIds
    edges {
      id
      beaconId
      senderId
      recipientId
      parentEdgeId
      batchId
    }
  }
}
