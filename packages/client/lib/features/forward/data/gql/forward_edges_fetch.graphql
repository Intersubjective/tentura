# import '/data/gql/user_model.graphql'

query ForwardEdgesFetch($beaconId: String!) {
  beacon_forward_edge(
    where: {beacon_id: {_eq: $beaconId}},
    order_by: {created_at: desc}
  ) {
    id
    beacon_id
    context
    note
    parent_edge_id
    batch_id
    created_at
    sender {
      ...UserModel
    }
    recipient {
      ...UserModel
    }
  }
}
