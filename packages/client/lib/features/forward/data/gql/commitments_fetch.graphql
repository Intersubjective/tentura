# import '/data/gql/user_model.graphql'

query CommitmentsFetch($beaconId: String!) {
  beacon_commitment(
    where: {beacon_id: {_eq: $beaconId}},
    order_by: {updated_at: desc}
  ) {
    message
    help_type
    uncommit_reason
    status
    created_at
    updated_at
    user {
      ...UserModel
    }
  }
}
