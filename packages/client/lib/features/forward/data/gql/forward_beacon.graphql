mutation ForwardBeacon(
  $beaconId: String!,
  $recipientIds: [String!]!,
  $note: String,
  $perRecipientNotes: String,
  $context: String,
  $parentEdgeId: String
) {
  beaconForward(
    id: $beaconId,
    recipientIds: $recipientIds,
    note: $note,
    perRecipientNotes: $perRecipientNotes,
    context: $context,
    parentEdgeId: $parentEdgeId
  )
}
