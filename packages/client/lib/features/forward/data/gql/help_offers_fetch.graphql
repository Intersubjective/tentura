# import '/data/gql/user_model.graphql'

query HelpOffersFetch($beaconId: String!) {
  beacon_help_offer(
    where: {beacon_id: {_eq: $beaconId}},
    order_by: {updated_at: desc}
  ) {
    message
    help_type
    withdraw_reason
    status
    created_at
    updated_at
    user {
      ...UserModel
    }
  }
}
