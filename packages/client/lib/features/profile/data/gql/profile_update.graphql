mutation ProfileUpdate(
  $displayName: String,
  $description: String,
  $handle: String,
  $dropImage: Boolean = false,
  $image: Upload = {}
) {
  userUpdate(
    displayName: $displayName,
    description: $description,
    handle: $handle,
    dropImage: $dropImage,
    image: $image
  ) {
    id
    handle
  }
}
