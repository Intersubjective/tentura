# import '/data/gql/beacon_model.graphql'
# import '/data/gql/user_model.graphql'

query ProfileForwardedToUser($meId: String!, $targetId: String!) {
  beacon_forward_edge(
    where: {
      sender_id: { _eq: $meId }
      recipient_id: { _eq: $targetId }
    }
    order_by: { created_at: desc }
  ) {
    id
    note
    recipient_rejected
    recipient_rejection_message
    created_at
    beacon {
      ...BeaconModel
      commitments(where: { user_id: { _eq: $targetId }, status: { _eq: 0 } }) {
        user_id
      }
      forward_edges(where: { sender_id: { _eq: $targetId } }, limit: 1) {
        id
      }
    }
  }
}

query ProfileCoCommitted($meId: String!, $targetId: String!) {
  beacon(
    where: {
      _and: [
        { commitments: { user_id: { _eq: $meId }, status: { _eq: 0 } } }
        { commitments: { user_id: { _eq: $targetId }, status: { _eq: 0 } } }
      ]
    }
    order_by: { updated_at: desc }
  ) {
    ...BeaconModel
    commitments(where: { user_id: { _eq: $targetId }, status: { _eq: 0 } }) {
      user_id
      message
      help_type
    }
  }
}
