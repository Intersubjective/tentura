# import '/data/gql/image_model.graphql'

query MutualFriendsFetch($id: String!) {
  mutualFriends(id: $id) {
    id
    title
    is_mutual_friend
    image {
      ...ImageModel
    }
    scores {
      src_score
      dst_score
    }
    user_presence {
      status
      last_seen_at
    }
  }
}
