# import '/data/gql/beacon_model.graphql'

query MyWorkInit($userId: String!, $context: String = "") {
  authoredNonClosed: beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [0, 3, 4, 5]},
      _or: [
        {context: {_eq: $context}},
        {context: {_is_null: true}}
      ]
    },
    order_by: {updated_at: desc}
  ) {
    ...BeaconModel
  }
  committedNonClosed: beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [0, 3, 4, 5]},
        _or: [
          {context: {_eq: $context}},
          {context: {_is_null: true}}
        ]
      }
    },
    order_by: {updated_at: desc}
  ) {
    beacon {
      ...BeaconModel
    }
  }
  authoredClosedIds: beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [1, 2, 6]},
      _or: [
        {context: {_eq: $context}},
        {context: {_is_null: true}}
      ]
    },
    order_by: {updated_at: desc}
  ) {
    id
  }
  committedClosedIds: beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [1, 2, 6]},
        _or: [
          {context: {_eq: $context}},
          {context: {_is_null: true}}
        ]
      }
    },
    order_by: {updated_at: desc}
  ) {
    beacon {
      id
    }
  }
}

query MyWorkClosed($userId: String!, $context: String = "") {
  authoredClosed: beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [1, 2, 6]},
      _or: [
        {context: {_eq: $context}},
        {context: {_is_null: true}}
      ]
    },
    order_by: {updated_at: desc}
  ) {
    ...BeaconModel
  }
  committedClosed: beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [1, 2, 6]},
        _or: [
          {context: {_eq: $context}},
          {context: {_is_null: true}}
        ]
      }
    },
    order_by: {updated_at: desc}
  ) {
    beacon {
      ...BeaconModel
    }
  }
}
