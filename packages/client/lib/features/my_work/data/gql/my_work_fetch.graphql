# import '/data/gql/beacon_model.graphql'
# import '/data/gql/user_model.graphql'

query MyWorkInit($userId: String!) {
  authoredNonClosed: beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [0, 3, 4, 5]}
    },
    order_by: {updated_at: desc}
  ) {
    ...BeaconModel
  }
  committedNonClosed: beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [0, 3, 4, 5]}
      }
    },
    order_by: {updated_at: desc}
  ) {
    message
    help_type
    coordination {
      response_type
    }
    beacon {
      ...BeaconModel
      forward_edges(limit: 3, order_by: {created_at: desc}) {
        sender {
          ...UserModel
        }
      }
    }
  }
  authoredClosedIds: beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [1, 2, 6]}
    },
    order_by: {updated_at: desc}
  ) {
    id
  }
  committedClosedIds: beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [1, 2, 6]}
      }
    },
    order_by: {updated_at: desc}
  ) {
    beacon {
      id
    }
  }
}

query MyWorkClosed($userId: String!) {
  authoredClosed: beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [1, 2, 6]}
    },
    order_by: {updated_at: desc}
  ) {
    ...BeaconModel
  }
  committedClosed: beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [1, 2, 6]}
      }
    },
    order_by: {updated_at: desc}
  ) {
    message
    help_type
    coordination {
      response_type
    }
    beacon {
      ...BeaconModel
      forward_edges(limit: 3, order_by: {created_at: desc}) {
        sender {
          ...UserModel
        }
      }
    }
  }
}
