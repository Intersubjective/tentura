# import '/data/gql/beacon_model.graphql'
# import '/data/gql/user_model.graphql'
# import 'beacon_model_with_help_offer_users.graphql'

query MyWorkInit($userId: String!) {
  authoredNonArchived: beacon(
    where: {
      user_id: {_eq: $userId},
      status: {_neq: 2},
      _not: {beacon_archiveds: {user_id: {_eq: $userId}}}
    },
    order_by: {updated_at: desc}
  ) {
    ...BeaconModelWithHelpOfferUsers
  }
  helpOfferedNonArchived: beacon_help_offer(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        status: {_neq: 2},
        _not: {beacon_archiveds: {user_id: {_eq: $userId}}}
      }
    },
    order_by: {updated_at: desc}
  ) {
    updated_at
    message
    help_type
    coordination {
      response_type
      updated_at
    }
    beacon {
      ...BeaconModelWithHelpOfferUsers
      forward_edges(limit: 3, order_by: {created_at: desc}) {
        sender {
          ...UserModel
        }
      }
    }
  }
  archivedIdHints: beacon_archived(
    where: {user_id: {_eq: $userId}}
  ) {
    beacon_id
  }
}

query MyWorkArchived($userId: String!) {
  archivedRows: beacon_archived(
    where: {user_id: {_eq: $userId}},
    order_by: {archived_at: desc}
  ) {
    beacon {
      ...BeaconModelWithHelpOfferUsers
    }
  }
  helpOfferedArchived: beacon_help_offer(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        status: {_neq: 2},
        beacon_archiveds: {user_id: {_eq: $userId}}
      }
    },
    order_by: {updated_at: desc}
  ) {
    updated_at
    message
    help_type
    coordination {
      response_type
      updated_at
    }
    beacon {
      ...BeaconModelWithHelpOfferUsers
      forward_edges(limit: 3, order_by: {created_at: desc}) {
        sender {
          ...UserModel
        }
      }
    }
  }
}
