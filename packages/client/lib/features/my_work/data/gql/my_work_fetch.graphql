# import '/data/gql/beacon_model.graphql'

query MyWorkAuthoredActive($userId: String!, $context: String = "") {
  beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [0, 3, 4, 5]},
      _or: [
        {context: {_eq: $context}},
        {context: {_is_null: true}}
      ]
    },
    order_by: {updated_at: desc}
  ) {
    ...BeaconModel
  }
}

query MyWorkAuthoredClosed($userId: String!, $context: String = "") {
  beacon(
    where: {
      user_id: {_eq: $userId},
      state: {_in: [1, 2, 6]},
      _or: [
        {context: {_eq: $context}},
        {context: {_is_null: true}}
      ]
    },
    order_by: {updated_at: desc}
  ) {
    ...BeaconModel
  }
}

query MyWorkCommittedActive($userId: String!, $context: String = "") {
  beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [0, 3, 4, 5]},
        _or: [
          {context: {_eq: $context}},
          {context: {_is_null: true}}
        ]
      }
    },
    order_by: {updated_at: desc}
  ) {
    beacon {
      ...BeaconModel
    }
  }
}

query MyWorkCommittedClosed($userId: String!, $context: String = "") {
  beacon_commitment(
    where: {
      user_id: {_eq: $userId},
      status: {_eq: 0},
      beacon: {
        state: {_in: [1, 2, 6]},
        _or: [
          {context: {_eq: $context}},
          {context: {_is_null: true}}
        ]
      }
    },
    order_by: {updated_at: desc}
  ) {
    beacon {
      ...BeaconModel
    }
  }
}
