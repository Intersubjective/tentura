query AttentionFeed($view: String!, $cursor: String, $limit: Int) {
  attentionFeed(view: $view, cursor: $cursor, limit: $limit) {
    summary { unreadTotal needsYouTotal }
    page {
      nextCursor
      items {
        id category kind priority title body actionUrl createdAt seenAt
        collapsedCount beaconId coordinationItemId actorUserId sourceEventKey
        destinationKind targetEntityId presentationKey presentationPayloadJson
        inAppPreferenceClass
        requiresAction attentionThreadKey settlementKind settledAt
      }
    }
  }
}
