mutation EvaluationSubmit(
  $id: String!
  $evaluatedUserId: String!
  $value: Int!
  $reasonTags: [String!]
  $note: String
  $acknowledgedHelpTags: [String!]
) {
  evaluationSubmit(
    id: $id
    evaluatedUserId: $evaluatedUserId
    value: $value
    reasonTags: $reasonTags
    note: $note
    acknowledgedHelpTags: $acknowledgedHelpTags
  )
}
