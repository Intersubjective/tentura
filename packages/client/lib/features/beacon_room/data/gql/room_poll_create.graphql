mutation RoomPollCreate(
  $beaconId: String!,
  $question: String!,
  $variants: [String!]!
) {
  RoomPollCreate(
    beaconId: $beaconId,
    question: $question,
    variants: $variants
  ) {
    id
    beaconId
    authorId
    body
    createdAt
    editedAt
    semanticMarker
    linkedBlockerId
    linkedFactCardId
    linkedPollingId
    pollDataJson
    systemPayloadJson
    authorTitle
    authorHasPicture
    authorPicHeight
    authorPicWidth
    authorBlurHash
    authorImageId
    reactionsJson
    myReaction
    attachmentsJson
  }
}
