query BeaconParticipantList($beaconId: String!) {
  BeaconParticipantList(beaconId: $beaconId) {
    id
    beaconId
    userId
    userTitle
    role
    status
    roomAccess
    offerNote
    nextMoveText
    nextMoveStatus
    nextMoveSource
    linkedMessageId
    lastSeenRoomAt
    createdAt
    updatedAt
  }
}
