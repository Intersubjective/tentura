query BeaconParticipantList($beaconId: String!) {
  BeaconParticipantList(beaconId: $beaconId) {
    id
    beaconId
    userId
    userTitle
    userHandle
    userHasPicture
    userPicHeight
    userPicWidth
    userBlurHash
    userImageId
    role
    status
    roomAccess
    offerNote
    nextMoveText
    nextMoveStatus
    nextMoveSource
    linkedMessageId
    lastSeenRoomAt
    helpType
    createdAt
    updatedAt
  }
}
