query RoomMessageList($beaconId: String!, $beforeIso: String) {
  RoomMessageList(beaconId: $beaconId, beforeIso: $beforeIso) {
    id
    beaconId
    authorId
    body
    createdAt
    editedAt
    semanticMarker
    linkedBlockerId
    linkedFactCardId
    linkedPollingId
    pollDataJson
    systemPayloadJson
    authorTitle
    authorHasPicture
    authorPicHeight
    authorPicWidth
    authorBlurHash
    authorImageId
    reactionsJson
    myReaction
    reactorsJson
    attachmentsJson
    mentions
  }
}
