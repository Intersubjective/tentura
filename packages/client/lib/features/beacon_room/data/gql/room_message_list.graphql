query RoomMessageList($beaconId: String!, $beforeIso: String) {
  RoomMessageList(beaconId: $beaconId, beforeIso: $beforeIso) {
    id
    beaconId
    authorId
    body
    createdAt
    semanticMarker
    linkedBlockerId
    linkedFactCardId
    systemPayloadJson
    authorTitle
    authorHasPicture
    authorPicHeight
    authorPicWidth
    authorBlurHash
    authorImageId
    reactionsJson
    myReaction
    attachmentsJson
  }
}
