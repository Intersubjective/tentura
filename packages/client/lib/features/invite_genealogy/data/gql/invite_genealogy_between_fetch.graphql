# import '/data/gql/user_public_model.graphql'

query InviteGenealogyBetween($targetId: String!) {
  inviteGenealogyBetween(target_id: $targetId) {
    viewer_node_key
    target_node_key
    common_ancestor_node_key
    nodes {
      node_key
      deleted_at
      user_created_at
      user {
        ...UserPublicModel
      }
    }
    edges {
      ancestor_node_key
      descendant_node_key
      ancestor_user_created_at
      descendant_user_created_at
      created_at
    }
  }
}
