# import '/data/gql/beacon_model.graphql'

query InboxFetch($context: String = "") {
  inbox_item(
    order_by: {latest_forward_at: desc},
    where: {
      _or: [
        {context: {_eq: $context}},
        {context: {_is_null: true}}
      ]
    }
  ) {
    beacon_id
    context
    forward_count
    latest_forward_at
    latest_note_preview
    status
    rejection_message
    before_response_terminal_at
    tombstone_dismissed_at
    inbox_provenance_data
    beacon {
      ...BeaconModel
    }
  }
}
