mutation BeaconCreate(
  $title: String!,
  $context: String = "",
  $description: String = "",
  $coordinates: Coordinates = {},
  $startAt: String = "",
  $endAt: String = "",
  $image: Upload = {},
  $tags: String = "",
  $iconCode: String,
  $iconBackground: Int,
  $needs: String,
  $addressLabel: String,
  $draft: Boolean
) {
  beaconCreate(
    title: $title,
    description: $description,
    coordinates: $coordinates,
    context: $context,
    startAt: $startAt,
    endAt: $endAt,
    image: $image,
    tags: $tags,
    iconCode: $iconCode,
    iconBackground: $iconBackground,
    needs: $needs,
    addressLabel: $addressLabel,
    draft: $draft
  ) {
    id
  }
}
