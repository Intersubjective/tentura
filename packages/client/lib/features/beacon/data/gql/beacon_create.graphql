mutation BeaconCreate(
  $title: String!,
  $context: String = "",
  $description: String = "",
  $coordinates: v2_Coordinates = {},
  $polling: v2_PollingInput = {},
  $startAt: String = "",
  $endAt: String = "",
  $image: Upload = {},
  $tags: String = "",
  $iconCode: String,
  $iconBackground: Int
) {
  beaconCreate(
    title: $title,
    description: $description,
    coordinates: $coordinates,
    context: $context,
    polling: $polling,
    startAt: $startAt,
    endAt: $endAt,
    image: $image,
    tags: $tags,
    iconCode: $iconCode,
    iconBackground: $iconBackground
  ) {
    id
  }
}
