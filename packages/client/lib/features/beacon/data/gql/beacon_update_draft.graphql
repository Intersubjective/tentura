mutation BeaconUpdateDraft(
  $id: String!,
  $title: String!,
  $context: String = "",
  $description: String = "",
  $coordinates: Coordinates = {},
  $polling: PollingInput = {},
  $startAt: String = "",
  $endAt: String = "",
  $tags: String = "",
  $iconCode: String,
  $iconBackground: Int,
  $needSummary: String,
  $successCriteria: String
) {
  beaconUpdateDraft(
    id: $id,
    title: $title,
    description: $description,
    coordinates: $coordinates,
    context: $context,
    polling: $polling,
    startAt: $startAt,
    endAt: $endAt,
    tags: $tags,
    iconCode: $iconCode,
    iconBackground: $iconBackground,
    needSummary: $needSummary,
    successCriteria: $successCriteria
  ) {
    id
  }
}
