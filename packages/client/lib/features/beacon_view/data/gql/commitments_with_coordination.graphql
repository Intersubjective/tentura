# import '/data/gql/image_model.graphql'

query CommitmentsWithCoordination($beaconId: String!) {
  commitmentsWithCoordination(id: $beaconId) {
    beaconId
    userId
    message
    helpType
    status
    uncommitReason
    createdAt
    updatedAt
    responseType
    responseUpdatedAt
    responseAuthorUserId
    user {
      id
      title
      description
      my_vote
      image {
        ...ImageModel
      }
      user_presence {
        last_seen_at
        status
      }
    }
  }
}
