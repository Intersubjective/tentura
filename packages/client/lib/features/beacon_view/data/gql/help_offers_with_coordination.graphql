# import '/data/gql/image_model.graphql'

query HelpOffersWithCoordination($beaconId: String!) {
  helpOffersWithCoordination(id: $beaconId) {
    beaconId
    userId
    message
    helpType
    status
    withdrawReason
    createdAt
    updatedAt
    responseType
    responseUpdatedAt
    responseAuthorUserId
    roomAccess
    user {
      id
      title
      description
      my_vote
      is_mutual_friend
      image {
        ...ImageModel
      }
      user_presence {
        last_seen_at
        status
      }
    }
  }
}
