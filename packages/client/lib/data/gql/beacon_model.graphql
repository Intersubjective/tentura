# import '/data/gql/image_model.graphql'
# import '/data/gql/user_model.graphql'

fragment BeaconModel on beacon {
  id
  icon_code
  icon_background
  title
  description
  needs
  created_at
  updated_at
  is_pinned
  context
  status
  status_changed_at
  my_vote
  start_at
  end_at
  long
  lat
  address_label
  tags
  lineage_parent_beacon_id
  lineage_root_beacon_id
  beacon_images(order_by: {position: asc}) {
    image {
      ...ImageModel
    }
  }
  author {
    ...UserModel
  }
  scores {
    src_score
    dst_score
  }
  beacon_review_window {
    closes_at
    opened_at
    status
  }
  help_offers_aggregate(where: { status: { _eq: 0 } }) {
    aggregate {
      count
    }
  }
  unanswered_help_offers: help_offers_aggregate(
    # Unreviewed = active offer (status 0) with no coordination row (author has not responded).
    where: { status: { _eq: 0 }, _not: { coordination: {} } }
  ) {
    aggregate {
      count
    }
  }
  can_read_content
}
