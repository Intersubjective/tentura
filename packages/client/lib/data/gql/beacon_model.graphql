# import '/data/gql/image_model.graphql'
# import '/data/gql/user_model.graphql'

fragment BeaconModel on beacon {
  id
  icon_code
  icon_background
  title
  description
  need_summary
  public_status
  last_public_meaningful_change
  success_criteria
  created_at
  updated_at
  is_pinned
  context
  state
  coordination_status
  coordination_status_updated_at
  my_vote
  start_at
  end_at
  long
  lat
  tags
  beacon_images(order_by: {position: asc}) {
    image {
      ...ImageModel
    }
  }
  author {
    ...UserModel
  }
  scores {
    src_score
    dst_score
  }
  beacon_review_window {
    closes_at
    opened_at
    status
  }
  commitments_aggregate(where: { status: { _eq: 0 } }) {
    aggregate {
      count
    }
  }
}
