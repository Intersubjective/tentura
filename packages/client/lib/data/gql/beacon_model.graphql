# import '/data/gql/polling_model.graphql'
# import '/data/gql/image_model.graphql'
# import '/data/gql/user_model.graphql'

fragment BeaconModel on beacon {
  id
  title
  description
  created_at
  updated_at
  is_pinned
  context
  state
  coordination_status
  coordination_status_updated_at
  my_vote
  start_at
  end_at
  long
  lat
  tags
  image {
    ...ImageModel
  }
  polling {
    ...PollingModel
  }
  author {
    ...UserModel
  }
  scores {
    src_score
    dst_score
  }
  beacon_review_window {
    closes_at
    opened_at
    status
  }
  commitments_aggregate(where: { status: { _eq: 0 } }) {
    aggregate {
      count
    }
  }
}
