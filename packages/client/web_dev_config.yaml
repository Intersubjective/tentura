server:
  host: 'localhost'
  port: 8888

  headers:
    - name: 'Cache-Control'
      value: 'no-cache, no-store, must-revalidate'
    - name: 'Cross-Origin-Opener-Policy'
      value: 'same-origin'
    - name: 'Cross-Origin-Embedder-Policy'
      value: 'credentialless'

  proxy:
    - target: 'http://localhost:2080/'
      prefix: '/api/v2/graphql'

    - target: 'http://localhost:8080/'
      prefix: '/api/v1/graphql'
      replace: '/v1/graphql'

    - target: 'http://localhost:2080/'
      prefix: '/api/v2/ws'

    - target: 'http://localhost:2080/'
      prefix: '/shared/'

    - target: 'http://localhost:2080/'
      prefix: '/firebase-messaging-sw.js'
