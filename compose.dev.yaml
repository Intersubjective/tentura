# Local development: Postgres, MeritRank, MinIO, Hasura, optional tools.
#
# Quick path (Flutter dev proxy only — pass explicit dart-defines; no silent defaults):
#   1. docker compose up -d
#   2. cd packages/server && dart run bin/tentura.dart
#      (requires SERVER_NAME, APP_ORIGIN, LANDING_ORIGIN, IMAGE_SERVER in .env for Env.prod)
#   3. cd packages/client && flutter run -d chrome --web-port=8888 \
#        --dart-define-from-file=env/test.env \
#        --dart-define=SERVER_NAME=http://localhost:8888 \
#        --dart-define=WS_SERVER_NAME=http://localhost:2080 \
#        --dart-define=INVITE_LINK_HOST=http://localhost:8888
#
# Subdomain split (mirrors dev.tentura.io + app.dev.tentura.io) — see Caddyfile.local:
#   1. docker compose up -d
#   2. Copy .env.example → .env; fill APP_ORIGIN, LANDING_ORIGIN, IMAGE_SERVER, SERVER_NAME
#   3. ./scripts/sync-landing-local-config.sh && ./scripts/sync-client-local-config.sh
#   4. ./scripts/run-server-local.sh
#   5. ./scripts/run-flutter-web-local.sh
#   6. caddy run --config Caddyfile.local
#   Open https://dev.lvh.me:9443/ (landing) and https://app.dev.lvh.me:9443/ (app).
#   Requires dev.lvh.me / app.dev.lvh.me → 127.0.0.1 (lvh.me DNS or /etc/hosts).
#   HTTP :9080 remains for handoff smoke tests; Google OAuth needs HTTPS :9443.
#   Offline hosts: dev.tentura.test / app.dev.tentura.test in /etc/hosts (see Caddyfile.local).
#   Static app only (no flutter): LOCAL_USE_FLUTTER_PROXY=off caddy run --config Caddyfile.local
#
# Point server Env at localhost: POSTGRES_HOST=127.0.0.1, S3_ENDPOINT=localhost:9000,
# S3_PATH_STYLE=true, S3_USE_SSL=false (HTTP MinIO), IMAGE_SERVER=http://localhost:9000/tentura
#
# Client version gate: set MIN_CLIENT_VERSION in .env to test the update banner locally.
# The locally-run server reads it from the environment; 0.0.0 (default) disables the check.

name: tentura

# Extension field: shared fragment for host-networked services.
x-common: &common
  init: true
  network_mode: host
  environment:
    - POSTGRES_PASSWORD
    - JWT_PRIVATE_PEM
    - JWT_PUBLIC_PEM

networks:
  # Postgres <-> MeritRank (internal). Postgres also joins db_host so :5432 publishes to the host
  # for the locally run Tentura / Hasura containers on host network (Docker 29 quirk).
  backend:
    internal: true
  db_host:
    driver: bridge

services:
  hasura:
    <<: *common
    hostname: hasura
    container_name: hasura
    image: hasura/graphql-engine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - 'HASURA_GRAPHQL_DEV_MODE=true'
      - 'HASURA_GRAPHQL_LOG_LEVEL=debug'
      - 'HASURA_GRAPHQL_ENABLE_CONSOLE=true'
      - 'HASURA_GRAPHQL_ADMIN_SECRET=password'
      - 'HASURA_GRAPHQL_ENABLE_TELEMETRY=false'
      - 'HASURA_GRAPHQL_UNAUTHORIZED_ROLE=anon'
      - 'HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES=true'
      - 'HASURA_GRAPHQL_INFER_FUNCTION_PERMISSIONS=false'
      - 'HASURA_GRAPHQL_ENABLE_METADATA_QUERY_LOGGING=true'
      - 'HASURA_GRAPHQL_DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@127.0.0.1:5432/postgres'
      - 'HASURA_GRAPHQL_JWT_SECRET={"type":"Ed25519", "key":"${JWT_PUBLIC_PEM}", "claims_map": {"x-hasura-allowed-roles": ["user", "admin"], "x-hasura-default-role": "user", "x-hasura-user-id": {"path": "$$.sub"}}}'
      - 'HASURA_GRAPHQL_EXPERIMENTAL_FEATURES=streaming_subscriptions,remove_empty_subscription_responses'
      - 'TENTURA_GRAPHQL_URL=http://localhost:2080/api/v2/graphql'

  meritrank:
    init: true
    restart: unless-stopped
    hostname: meritrank
    container_name: meritrank
    image: vbulavintsev/meritrank-service:v0.8.0
    networks:
      - backend
    environment:
      - 'MERITRANK_SERVER_ADDRESS=0.0.0.0'
      - 'MERITRANK_SERVER_PORT=8080'
      - 'MERITRANK_NUM_WALKS=1000'
      - 'MERITRANK_ZERO_OPINION_FACTOR=0.02'
      - 'MERITRANK_WALKS_CACHE_SIZE=200'

  postgres:
    init: true
    restart: unless-stopped
    hostname: postgres
    container_name: postgres
    image: vbulavintsev/postgres-tentura:v0.8.0
    networks:
      backend: {}
      db_host: {}
    ports:
      - '127.0.0.1:5432:5432'
    depends_on:
      meritrank:
        condition: service_started
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD
      - 'MERITRANK_SERVICE_URL=tcp://meritrank:8080'
      - 'MERITRANK_RECV_TIMEOUT_MSEC=60000'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 15s

  minio:
    <<: *common
    hostname: minio
    container_name: minio
    image: minio/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - 'MINIO_ROOT_USER=minioadmin'
      - 'MINIO_ROOT_PASSWORD=minioadmin'

  schema_fetcher:
    profiles:
      - tools
    <<: *common
    build:
      dockerfile_inline: |
        FROM node
        RUN npm install -g get-graphql-schema
    image: alexandrim0/schema_fetcher
    container_name: schema_fetcher
    hostname: schema_fetcher
    depends_on:
      hasura:
        condition: service_started
    volumes:
      - ./packages/client/lib/data/gql:/gql
    user: 1000:1000
    command: sh -c "get-graphql-schema -h 'x-hasura-admin-secret=password' -h 'x-hasura-role=user' http://localhost:8080/v1/graphql > /gql/schema.graphql"

  pgadmin:
    <<: *common
    image: dpage/pgadmin4
    container_name: pgadmin
    hostname: pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - 'PGADMIN_DEFAULT_EMAIL=admin@local.host'
      - 'PGADMIN_DEFAULT_PASSWORD=password'
      - 'PGADMIN_DISABLE_POSTFIX=true'
      - 'SERVER_MODE=false'

volumes:
  pg_data:
  minio_data:
